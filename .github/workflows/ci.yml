name: CI

on:
  push:
    branches: [main]
    tags: ['v*', 'bleveuk/v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  core:
    name: core (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.22.x', '1.25.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: gofmt
        run: test -z "$(gofmt -l . | tee /dev/stderr)"
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  bleveuk:
    name: bleveuk module
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bleveuk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Bleve requires Go 1.25; the local replace directive points at the
          # checked-out core, so no release tag is needed in CI.
          go-version: '1.25.x'
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      # Lint the core module only. bleveuk targets go 1.25 (Bleve's floor) and
      # the prebuilt golangci-lint binary refuses modules newer than its own Go
      # build; bleveuk is thin glue and is covered by `go vet` in its own job.
      - name: lint core
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
